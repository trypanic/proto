name: Proto plugins Windows

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test Windows ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: windows-2025
          - arch: aarch64
            runner: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install proto
        uses: moonrepo/setup-toolchain@v0
        with:
          cache: false

      - name: Configure test tools
        shell: pwsh
        run: |
          $toolPins = @'
          golang-migrate = "4.19.0"
          skillshare = "0.19.5"
          '@

          $toolPlugins = @'
          golang-migrate = "file://./plugins/golang-migrate.toml"
          skillshare = "file://./plugins/skillshare.toml"
          '@

          if ("${{ matrix.arch }}" -eq "x86_64") {
            $toolPins += "`nmongosh = `"2.8.3`""
            $toolPlugins += "`nmongosh = `"file://./plugins/mongosh.toml`""
            $toolPins += "`npsql = `"18.3.0`""
            $toolPlugins += "`npsql = `"file://./plugins/psql.toml`""
            $toolPins += "`nsentrux = `"0.5.7`""
            $toolPlugins += "`nsentrux = `"file://./plugins/sentrux.toml`""
            $toolPins += "`nstaticcheck = `"2026.1.0`""
            $toolPlugins += "`nstaticcheck = `"file://./plugins/staticcheck.toml`""
          }

          $config = @"
          $toolPins
          [plugins.tools]
          $toolPlugins
          "@
          Set-Content -Path .prototools -Value $config -NoNewline

      - name: Install plugin tools
        shell: pwsh
        run: proto install --config-mode local

      - name: Verify golang-migrate
        shell: pwsh
        run: |
          $version = (& proto run golang-migrate -- -version 2>&1 | Out-String).Trim()
          if ($version -ne "4.19.0") {
            throw "Expected golang-migrate 4.19.0, got '$version'"
          }

      - name: Verify mongosh
        if: matrix.arch == 'x86_64'
        shell: pwsh
        run: |
          $version = (& proto run mongosh -- --version 2>&1 | Out-String).Trim()
          if ($version -ne "2.8.3") {
            throw "Expected mongosh 2.8.3, got '$version'"
          }

      - name: Verify skillshare
        shell: pwsh
        run: |
          $version = (& proto run skillshare -- --version 2>&1 | Out-String).Trim()
          if ($version -ne "skillshare v0.19.5") {
            throw "Expected skillshare v0.19.5, got '$version'"
          }

      - name: Verify psql
        if: matrix.arch == 'x86_64'
        shell: pwsh
        run: |
          $version = (& proto run psql -- --version 2>&1 | Out-String).Trim()
          if ($version -ne "psql (PostgreSQL) 18.3") {
            throw "Expected psql (PostgreSQL) 18.3, got '$version'"
          }

      - name: Verify sentrux
        if: matrix.arch == 'x86_64'
        shell: pwsh
        env:
          SENTRUX_SKIP_GRAMMAR_DOWNLOAD: "1"
        run: |
          $output = (& proto run sentrux -- --version 2>&1 | Out-String).Trim()
          $lines = $output -split "`r?`n" | ForEach-Object { $_.Trim() }
          if ($lines -notcontains "sentrux 0.5.7") {
            throw "Expected sentrux 0.5.7, got output '$output'"
          }

      - name: Verify staticcheck
        if: matrix.arch == 'x86_64'
        shell: pwsh
        run: |
          $version = (& proto run staticcheck -- -version 2>&1 | Out-String).Trim()
          if ($version -ne "staticcheck.exe 2026.1 (v0.7.0)") {
            throw "Expected staticcheck.exe 2026.1 (v0.7.0), got '$version'"
          }
