name: Proto plugins macOS

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: aarch64
            runner: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install proto
        uses: moonrepo/setup-toolchain@v0

      - name: Configure test tools
        run: |
          cat > .prototools <<'EOF'
          golang-migrate = "4.19.0"
          skillshare = "0.19.5"
          staticcheck = "2026.1.0"
          EOF
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            cat >> .prototools <<'EOF'
          sentrux = "0.5.7"
          EOF
          fi
          cat >> .prototools <<'EOF'
          [plugins.tools]
          golang-migrate = "file://./plugins/golang-migrate.toml"
          skillshare = "file://./plugins/skillshare.toml"
          staticcheck = "file://./plugins/staticcheck.toml"
          EOF
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            cat >> .prototools <<'EOF'
          sentrux = "file://./plugins/sentrux.toml"
          EOF
          fi

      - name: Install plugin tools
        run: proto install --config-mode local

      - name: Verify golang-migrate
        run: |
          version="$(proto run golang-migrate -- -version 2>&1)"
          test "$version" = "4.19.0"

      - name: Verify skillshare
        run: |
          version="$(proto run skillshare -- --version 2>&1)"
          test "$version" = "skillshare v0.19.5"

      - name: Verify sentrux
        if: matrix.arch == 'aarch64'
        env:
          SENTRUX_SKIP_GRAMMAR_DOWNLOAD: "1"
        run: |
          version="$(proto run sentrux -- --version 2>&1)"
          test "$version" = "sentrux 0.5.7"

      - name: Verify staticcheck
        run: |
          version="$(proto run staticcheck -- -version 2>&1)"
          test "$version" = "staticcheck 2026.1 (v0.7.0)"
